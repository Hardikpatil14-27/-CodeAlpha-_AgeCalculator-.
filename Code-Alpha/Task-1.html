<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Age Calculator</h2>

    <div>
      <input type="number" id="day" placeholder="DD" min="1" max="31">
      <input type="number" id="month" placeholder="MM" min="1" max="12">
      <input type="number" id="year" placeholder="YYYY" min="1900" max="2100">
    </div>

    <button onclick="calculateAge()">Calculate Age</button>

    <div class="error" id="error"></div>
    <div class="result" id="result"></div>
  </div>

  <script>
    function calculateAge() {
      const day = parseInt(document.getElementById('day').value);
      const month = parseInt(document.getElementById('month').value);
      const year = parseInt(document.getElementById('year').value);

      const errorDiv = document.getElementById('error');
      const resultDiv = document.getElementById('result');

      errorDiv.textContent = "";
      resultDiv.textContent = "";

      
      if (isNaN(day) || isNaN(month) || isNaN(year)) {
        errorDiv.textContent = "Please enter all fields correctly.";
        return;
      }

      if (day < 1 || day > 31 || month < 1 || month > 12 || year < 1900) {
        errorDiv.textContent = "Please enter a valid date.";
        return;
      }

      const birthDate = new Date(year, month - 1, day);
      const today = new Date();

      if (birthDate > today) {
        errorDiv.textContent = "Date of birth cannot be in the future.";
        return;
      }

      let years = today.getFullYear() - birthDate.getFullYear();
      let months = today.getMonth() - birthDate.getMonth();
      let days = today.getDate() - birthDate.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      resultDiv.textContent = `Age: ${years} years, ${months} months, ${days} days`;
    }
  </script>
</body>
</html>
